<div class="card shadow border-0">

    <div class="card-body p-4">

        <h4>Cadastro de clientes</h4>
        <p>Preencha os campos para incluir um cliente.</p>

        <hr />

        <form>

            <div class="row">

                <!-- Nome -->
                <div class="col-md-12 mb-3">
                    <label class="form-label">Nome do Cliente</label>
                    <input type="text" class="form-control" placeholder="Digite o nome do cliente">
                </div>

                <!-- CPF -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">CPF</label>
                    <input type="text" class="form-control" placeholder="Digite o CPF">
                </div>

                <!-- Email -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Digite o email">
                </div>

                <!-- Telefone -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" class="form-control" placeholder="Digite o telefone">
                </div>

                <!-- Nível -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nível</label>
                    <select class="form-select">
                        <option value="">Selecione o nível</option>
                        @for (item of niveisCliente(); track item.id) {
                          <option value="{{ item.id }}">
                            {{ item.nome }}
                          </option>>
                        } 
                    </select>
                </div>

            </div>

            <!-- Botão -->
            <div class="d-flex mt-2">
                <button type="submit" class="btn btn-primary px-4">
                    Confirmar Cadastro
                </button>
            </div>

        </form>

    </div>

</div>
